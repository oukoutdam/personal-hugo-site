{{ $title := .Get "title" }}
{{ $organization := .Get "organization" }}
{{ $year := .Get "year" }}
{{ $description := .Get "description" }}

<div style="margin-top: 1.25rem; margin-bottom: 1.25rem;">
  <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 1rem;">
    <strong>{{ $title }}</strong>
    <span style="flex-shrink: 0; opacity: 0.7; font-size: 0.9em; white-space: nowrap;">{{ $year }}</span>
  </div>
  <div style="opacity: 0.8;">{{ $organization }}</div>
  <div style="opacity: 0.7; font-size: 0.9em;">{{ $description }}</div>
</div>
